<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Upload & Summarize | EduMind</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
  /* Background and layout */
  body {
    font-family: 'Poppins', sans-serif;
    background: url('../sum.jpg') no-repeat center center/cover;
    min-height: 100vh;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }

  /* Glassmorphism container */
  .container {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    padding: 40px 50px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(31, 38, 135, 0.3);
    -webkit-backdrop-filter: blur(15px);
    backdrop-filter: blur(15px);
    border: 1px solid rgba(255, 255, 255, 0.2);
    width: 400px;
    animation: fadeIn 1.2s ease;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
  }

  /* Title */
  h2 {
    color: #fff;
    font-weight: 600;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  p.subtitle {
    color: #ddd;
    font-size: 14px;
    margin-bottom: 25px;
  }

  /* File input styling */
  input[type="file"] {
    display: block;
    width: 100%;
    padding: 10px;
    background: rgba(255, 255, 255, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-radius: 10px;
    margin-bottom: 15px;
    color: #000;
    cursor: pointer;
  }

  input::file-selector-button {
    background-color: #fff;
    border: none;
    border-radius: 6px;
    color: #444;
    font-weight: 600;
    padding: 8px 14px;
    cursor: pointer;
    transition: 0.3s;
  }

  input::file-selector-button:hover {
    background-color: #eaeaea;
  }

  /* Upload button */
  #uploadBtn {
    width: 100%;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    border: none;
    border-radius: 10px;
    padding: 12px 0;
    color: #fff;
    font-weight: 600;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: 0.3s;
  }

  #uploadBtn:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #2575fc, #6a11cb);
  }

  #status {
    margin-top: 20px;
    font-size: 15px;
    color: #fff;
  }

#result-box {
    width: 100%;
    max-width: 1200px;
    margin: 30px auto;
    padding: 25px;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    border-radius: 16px;
}

#result {
    white-space: normal !important;
    overflow-wrap: break-word !important;
    font-size: 19px;
    line-height: 1.7;
    color: rgb(24, 20, 20);
    text-align: left;
}


  /* Back button */
  .back-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    color: #fff;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
  }

  .back-btn:hover {
    background: rgba(255,255,255,0.4);
  }

.summary-options {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 15px 0 25px;
}

.option-card {
  position: relative;
  cursor: pointer;
  width: 120px;
  height: 80px;
  border-radius: 15px;
  background: rgba(255,255,255,0.2);
  border: 2px solid rgba(255,255,255,0.4);
  backdrop-filter: blur(10px);
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.25s ease-in-out;
}

.option-card:hover {
  transform: translateY(-4px);
  background: rgba(255,255,255,0.28);
}

.option-card input {
  display: none;
}

.label-text {
  color: rgb(7, 7, 7);
  font-size: 20px;
  font-weight: 700;
  text-align: center;
  line-height: 1.1;
}

.label-text small {
  font-weight: 400;
  font-size: 14px;
}

/* ⭐ SELECTED STATE FIXED — FULL CARD CHANGES */
.option-card input:checked + .label-text {
  color: #fff;
}

.option-card input:checked ~ .label-text {
  color: white;
}

.option-card input:checked + .label-text,
.option-card input:checked ~ .label-text {
  color: #fff;
}

.option-card input:checked {
}

.option-card:has(input:checked) {
  background: linear-gradient(45deg, #6a5af9, #4a9bff);
  border-color: rgba(255,255,255,0.9);
  box-shadow: 0 0 15px rgba(100,140,255,0.7);
  transform: translateY(-4px);
}


</style>
</head>

<body>
  <div class="container">
    <h2>📘 Upload & Summarize</h2>
    <p class="subtitle">Upload a PDF, DOCX, or TXT file to generate a summary instantly.</p>

    <input type="file" id="fileInput" />

    <div class="summary-options">
  <label class="option-card">
    <input type="radio" name="summaryLength" value="250" checked>
    <span class="label-text">250<br><small>words</small></span>
  </label>

  <label class="option-card">
    <input type="radio" name="summaryLength" value="500">
    <span class="label-text">500<br><small>words</small></span>
  </label>

  <label class="option-card">
    <input type="radio" name="summaryLength" value="750">
    <span class="label-text">750<br><small>words</small></span>
  </label>
</div>

    <button id="uploadBtn" type="button">Upload & Summarize</button>

    <p id="status"></p>
<div id="result-box">
    <div id="result"></div>
</div>

    <a href="../index.html" class="back-btn">← Back to Home</a>
  </div>

<script>
console.clear();
console.log("✅ JS loaded successfully");

const btn = document.getElementById("uploadBtn");
const fileInput = document.getElementById("fileInput");
const statusEl = document.getElementById("status");
const resultEl = document.getElementById("result");
const radios = document.getElementsByName("summaryLength");

function getSelectedLength() {
  for (let r of radios) {
    if (r.checked) return r.value;
  }
  return 250;
}

btn.addEventListener("click", async (e) => {
  e.preventDefault();

  const file = fileInput.files[0];
  if (!file) return alert("Please select a file first!");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("length", getSelectedLength());   // ⭐ FIXED — send word count

  statusEl.textContent = "⏳ Uploading and summarizing...";
  resultEl.innerHTML = "";

  try {
    const res = await fetch("http://127.0.0.1:5000/api/upload", {
      method: "POST",
      body: formData,
    });

    const data = await res.json();

    // 🔥 HANDLE ERRORS SAFELY — NO CRASH
    if (!data.summary) {
      statusEl.textContent = "⚠️ Failed";
      resultEl.innerHTML =
        `<p style="color:red; font-weight:600;">❌ ${data.error || "Unknown error"}</p>`;
      return;
    }

    statusEl.textContent = "✅ Summary generated successfully!";

    // Format clean paragraphs (horizontal)
    let formatted = data.summary
      .split(/[.\n]+/)   // break by sentences
      .filter(t => t.trim() !== "")
      .map(t => `<span style="display:inline-block; margin-right:10px;">${t.trim()}.</span>`)
      .join("");

    resultEl.innerHTML = formatted;

  } catch (err) {
    statusEl.textContent = "⚠️ Error: " + err.message;
    resultEl.innerHTML =
      `<p style="color:red;">❌ ${err.message}</p>`;
  }
});
</script>
</body>
</html>
